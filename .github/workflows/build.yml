name: Build, push, and deploy

on:
  push:
    branches: [main]

# A newer push supersedes any in-flight run — prevents an older commit's
# deploy job from finishing after (and overwriting) a newer one's.
concurrency:
  group: build-deploy-main
  cancel-in-progress: true

permissions:
  contents: read
  packages: write
  id-token: write # OIDC login to Azure — no stored credentials

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python (for tests)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run unit tests
        run: |
          pip install -r requirements.txt pytest
          python -m pytest tests/ -q

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Log in to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy new revision to Container Apps
        run: |
          az containerapp update \
            --name ttb-labels-app \
            --resource-group ttb-labels \
            --image ghcr.io/${{ github.repository }}:${{ github.sha }}
